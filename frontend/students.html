<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Students — PlaceTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div><div class="logo-title">PlaceTrack</div><div class="logo-sub">SPIT · 2024</div></div>
    </div>
    <nav class="nav">
      <a href="index.html"        class="nav-item"><span class="nav-icon">▣</span> Dashboard</a>
      <a href="students.html"     class="nav-item active"><span class="nav-icon">◉</span> Students</a>
      <a href="companies.html"    class="nav-item"><span class="nav-icon">◈</span> Companies</a>
      <a href="jobs.html"         class="nav-item"><span class="nav-icon">◆</span> Job Openings</a>
      <a href="applications.html" class="nav-item"><span class="nav-icon">◇</span> Applications</a>
      <a href="results.html"      class="nav-item"><span class="nav-icon">★</span> Placed Students</a>
    </nav>
    <div class="sidebar-footer">EXTC · Batch A</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title">Students</h1>
        <p class="page-sub">Manage student records</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add Student</button>
    </header>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Branch</th>
            <th>CGPA</th>
            <th>Backlogs</th>
            <th>Batch</th>
            <th>Email</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="studentTable">
          <tr><td colspan="8" class="empty-state"><div class="empty-icon">◉</div>Loading students...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- ADD STUDENT MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Add New Student</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="f_student_id" placeholder="e.g. 2024200087"/>
        </div>
        <div class="form-group">
          <label>UID</label>
          <input type="text" id="f_uid" placeholder="University ID"/>
        </div>
        <div class="form-group full">
          <label>Full Name</label>
          <input type="text" id="f_full_name" placeholder="Sanchita Patil"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="f_email" placeholder="student@spit.ac.in"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="f_phone" placeholder="9876543210"/>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="f_dob"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="f_gender">
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Branch</label>
          <select id="f_branch">
            <option>EXTC</option><option>CS</option><option>IT</option>
            <option>MECH</option><option>CIVIL</option><option>AIDS</option>
          </select>
        </div>
        <div class="form-group">
          <label>Batch Year</label>
          <input type="number" id="f_batch_year" placeholder="2024"/>
        </div>
        <div class="form-group">
          <label>CGPA</label>
          <input type="number" step="0.01" id="f_cgpa" placeholder="8.50"/>
        </div>
        <div class="form-group">
          <label>Backlogs</label>
          <input type="number" id="f_backlogs" value="0"/>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <textarea id="f_address" placeholder="Mumbai, Maharashtra"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function loadStudents() {
      const students = await api.get('/students');
      const tbody = document.getElementById('studentTable');
      if (!students.length) {
        tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">◉</div>No students found. Add one!</div></td></tr>';
        return;
      }
      tbody.innerHTML = students.map(s => `
        <tr>
          <td>${s.student_id}</td>
          <td><strong>${s.full_name}</strong></td>
          <td><span class="badge badge-blue">${s.branch}</span></td>
          <td>${s.cgpa}</td>
          <td>${s.backlogs === 0 ? '<span class="badge badge-green">0</span>' : `<span class="badge badge-red">${s.backlogs}</span>`}</td>
          <td>${s.batch_year}</td>
          <td>${s.email}</td>
          <td><button class="btn btn-danger" onclick="deleteStudent('${s.student_id}')">Delete</button></td>
        </tr>
      `).join('');
    }

    async function addStudent() {
      const data = {
        student_id: document.getElementById('f_student_id').value,
        uid:        document.getElementById('f_uid').value,
        full_name:  document.getElementById('f_full_name').value,
        email:      document.getElementById('f_email').value,
        phone:      document.getElementById('f_phone').value,
        dob:        document.getElementById('f_dob').value,
        gender:     document.getElementById('f_gender').value,
        branch:     document.getElementById('f_branch').value,
        batch_year: document.getElementById('f_batch_year').value,
        cgpa:       document.getElementById('f_cgpa').value,
        backlogs:   document.getElementById('f_backlogs').value,
        address:    document.getElementById('f_address').value,
      };
      const res = await api.post('/students', data);
      alert(res.message || res.error);
      if (res.message) { closeModal(); loadStudents(); }
    }

    async function deleteStudent(id) {
      if (!confirm('Delete this student?')) return;
      const res = await api.delete('/students/' + id);
      alert(res.message || res.error);
      loadStudents();
    }

    function openModal()  { document.getElementById('modal').classList.add('open'); }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    loadStudents();
  </script>
</body>
</html>
