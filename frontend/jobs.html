<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Openings — PlaceTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <div><div class="logo-title">PlaceTrack</div><div class="logo-sub">SPIT · 2024</div></div>
    </div>
    <nav class="nav">
      <a href="index.html"        class="nav-item"><span class="nav-icon">▣</span> Dashboard</a>
      <a href="students.html"     class="nav-item"><span class="nav-icon">◉</span> Students</a>
      <a href="companies.html"    class="nav-item"><span class="nav-icon">◈</span> Companies</a>
      <a href="jobs.html"         class="nav-item active"><span class="nav-icon">◆</span> Job Openings</a>
      <a href="applications.html" class="nav-item"><span class="nav-icon">◇</span> Applications</a>
      <a href="results.html"      class="nav-item"><span class="nav-icon">★</span> Placed Students</a>
    </nav>
    <div class="sidebar-footer">EXTC · Batch A</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title">Job Openings</h1>
        <p class="page-sub">Active placement drives</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Post Job Drive</button>
    </header>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th><th>Role</th><th>Type</th>
            <th>Package</th><th>Min CGPA</th><th>Drive Date</th><th>Status</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="jobTable">
          <tr><td colspan="8" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Post Job Drive</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label>Company ID</label>
          <input type="number" id="f_company_id" placeholder="Enter Company ID from Companies page"/>
        </div>
        <div class="form-group full">
          <label>Job Title</label>
          <input type="text" id="f_job_title" placeholder="Software Engineer"/>
        </div>
        <div class="form-group">
          <label>Job Type</label>
          <select id="f_job_type">
            <option>Full-Time</option><option>Internship</option><option>Part-Time</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="f_location" placeholder="Pune / Remote"/>
        </div>
        <div class="form-group">
          <label>Package (LPA)</label>
          <input type="number" step="0.01" id="f_package" placeholder="6.50"/>
        </div>
        <div class="form-group">
          <label>Min CGPA</label>
          <input type="number" step="0.01" id="f_min_cgpa" placeholder="6.00"/>
        </div>
        <div class="form-group">
          <label>Max Backlogs Allowed</label>
          <input type="number" id="f_max_backlogs" value="0"/>
        </div>
        <div class="form-group">
          <label>Eligible Branches</label>
          <input type="text" id="f_branches" placeholder="EXTC, CS, IT"/>
        </div>
        <div class="form-group">
          <label>Application Deadline</label>
          <input type="date" id="f_deadline"/>
        </div>
        <div class="form-group">
          <label>Drive Date</label>
          <input type="date" id="f_drive_date"/>
        </div>
        <div class="form-group full">
          <label>Job Description</label>
          <textarea id="f_description" placeholder="Roles and responsibilities..."></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addJob()">Post Drive</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    async function loadJobs() {
      const jobs = await api.get('/jobs');
      const tbody = document.getElementById('jobTable');
      if (!jobs.length) {
        tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">◆</div>No job drives posted.</div></td></tr>';
        return;
      }
      tbody.innerHTML = jobs.map(j => `
        <tr>
          <td><strong>${j.company_name}</strong></td>
          <td>${j.job_title}</td>
          <td><span class="badge badge-blue">${j.job_type}</span></td>
          <td><span class="badge badge-green">${j.package_lpa} LPA</span></td>
          <td>${j.min_cgpa}</td>
          <td>${j.drive_date ? j.drive_date.split('T')[0] : '—'}</td>
          <td><span class="badge ${j.status === 'Open' ? 'badge-green' : 'badge-red'}">${j.status}</span></td>
          <td><button class="btn btn-danger" onclick="deleteJob(${j.job_id})">Delete</button></td>
        </tr>
      `).join('');
    }

    async function addJob() {
      const data = {
        company_id:          document.getElementById('f_company_id').value,
        job_title:           document.getElementById('f_job_title').value,
        job_type:            document.getElementById('f_job_type').value,
        location:            document.getElementById('f_location').value,
        package_lpa:         document.getElementById('f_package').value,
        min_cgpa:            document.getElementById('f_min_cgpa').value,
        max_backlogs:        document.getElementById('f_max_backlogs').value,
        eligible_branches:   document.getElementById('f_branches').value,
        application_deadline:document.getElementById('f_deadline').value,
        drive_date:          document.getElementById('f_drive_date').value,
        description:         document.getElementById('f_description').value,
      };
      const res = await api.post('/jobs', data);
      alert(res.message || res.error);
      if (res.message) { closeModal(); loadJobs(); }
    }

    async function deleteJob(id) {
      if (!confirm('Delete this job?')) return;
      const res = await api.delete('/jobs/' + id);
      alert(res.message || res.error);
      loadJobs();
    }

    function openModal()  { document.getElementById('modal').classList.add('open'); }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }
    loadJobs();
  </script>
</body>
</html>
